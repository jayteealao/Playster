# Added by wf-meta build-pipeline — plan v1, 2026-06-20
# Pre-merge code-quality + security gates for the pnpm monorepo (backend + summarizer)
# and the Android release dry-run. Job names match the plan's pre-merge-checks so they
# can be wired as required status checks.
name: PR Quality

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Requires `prettier` (root dev-dep) and the ktlint Gradle plugin in android/. See deps-to-install.
      - name: format-check
        run: pnpm exec prettier --check . && (cd android && ./gradlew ktlintCheck)

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # eslint is already configured in both packages; `detekt` Gradle plugin must be added in android/. See deps-to-install.
      - name: lint
        run: pnpm -r run lint && (cd android && ./gradlew detekt)

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: type-check
        run: pnpm -r exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Required gate runs fast unit tests only. Emulator-backed and env-dependent
      # integration tests run in the non-required `integration-test` job below.
      - name: test (unit)
        run: pnpm -r run test:unit

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # plan: fail-on high. osv-scanner fails on findings; tune severity via .osv-scanner.toml if needed.
      - name: Dependency audit (osv-scanner)
        uses: google/osv-scanner-action/osv-scanner-action@v2.0.2
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --recursive
            ./

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          VER=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
      # Plan: gitleaks detect --no-banner --redact. `dir` scans the working tree
      # deterministically (no PR-range quirks); exits non-zero on any finding.
      - name: Secret scan (gitleaks)
        run: gitleaks dir . --config .gitleaks.toml --no-banner --redact --exit-code 1

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # license-checker scans the resolved dependency tree; in a pnpm monorepo run it per workspace if coverage gaps appear.
      - name: License check
        run: >-
          npx --yes license-checker
          --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense"
          --excludePrivatePackages

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint PR commit messages
        uses: wagoid/commitlint-github-action@v6

  android-unit-test:
    runs-on: ubuntu-latest
    # CI-1: hangs previously defaulted to GitHub's 360min job timeout. Sized to
    # ~2-3x the observed local run time.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0
      - name: Fix gradlew perms & line endings
        working-directory: android
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
      - name: Decode google-services.json
        working-directory: android
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          mkdir -p app
          printf '%s' "$GOOGLE_SERVICES_JSON_B64" | tr -d '\r\n\t ' | base64 -d > app/google-services.json
      - name: Android unit tests
        working-directory: android
        run: ./gradlew --no-daemon testDebugUnitTest
      - name: Upload unit-test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-unit-test-reports
          path: android/app/build/reports/tests/
          retention-days: 7

  # CI-2 (2026-07-20): verifyRoborazziDebug compares Compose renders against ~116
  # goldens recorded locally on Windows (JDK temurin 21.0.9+10, Robolectric 4.16
  # NATIVE graphics mode / Skia) — this job has never executed on ubuntu-latest.
  # Roborazzi's own README/FAQ (github.com/takahirom/roborazzi, checked live for
  # this fix) states plainly: "there are no guarantees for identical rendering
  # across all environments" for cross-OS runs, and recommends recording and
  # verifying screenshots in the same environment. Determinism measures below —
  # none require re-recording goldens:
  #  - `runs-on` pinned to an exact Ubuntu LTS label instead of `-latest`, so the
  #    runner image's OS/library stack (glibc, fontconfig, freetype, harfbuzz —
  #    all things Skia's native rendering path can link against) can't silently
  #    change between two CI runs. This is a *second*, independent source of
  #    golden churn layered on top of the Windows-vs-Linux gap this job already
  #    carries, and it's the one actually within a workflow file's control.
  #  - JDK pinned to the exact local patch the goldens were recorded under
  #    (temurin 21.0.9+10), removing JDK-patch drift as a variable. Low expected
  #    payoff on its own — NATIVE mode renders through Skia's native binary, not
  #    Java2D, so the JDK patch shouldn't touch pixel output — but free to fix
  #    while pinning everything else, and directly matches this finding's ask.
  #    If Adoptium ever stops serving 21.0.9+10, bump to the next Temurin 21 LTS
  #    patch and re-verify `java -version` against the dev machine.
  #  - No compareOptions.changeThreshold / tolerance was added. Checked against
  #    roborazzi-core's RoborazziOptions.common.kt (tag 1.68.0, the version this
  #    repo pins): changeThreshold is not exposed as a gradle.properties/-P
  #    switch — it is only settable in Kotlin via
  #    RoborazziOptions.CompareOptions(changeThreshold = ...), passed per-call to
  #    captureRoboImage(). None of this repo's 9 Roborazzi suites pass a custom
  #    RoborazziOptions today, so introducing a threshold would mean editing
  #    every test's capture call — out of this finding's scope, and it would
  #    weaken the project's byte-exact local gate for a "might help" cross-OS
  #    hedge. Left as the library default (SimpleImageComparator maxDistance
  #    0.007, changeThreshold 0) locally and in CI.
  #  - Recovery path if this job's first real PR run still shows drift:
  #    .github/workflows/roborazzi-record.yml (workflow_dispatch-only) re-records
  #    goldens inside this exact pinned CI environment and uploads them as a
  #    build artifact. Nothing is auto-committed — a maintainer downloads,
  #    reviews, and commits the diffs by hand.
  # Residual risk this workflow file cannot fix: Home/Player/Playlist/Search/
  # Settings/Auth screens use Material Typography (ui/theme/Type.kt), which sets
  # fontFamily = FontFamily.Default rather than one of the app's five bundled
  # variable families (ui/editorial/EditorialTypography.kt, used only by the
  # reader screens). Those goldens resolve through Robolectric's default font
  # path instead of a self-contained bundled asset and are the most exposed to
  # any cross-platform font-metric drift, if it turns out to exist.
  android-screenshot-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 25 # CI-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21.0.9+10' # exact patch match to the goldens' recording machine
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0
      - name: Fix gradlew perms & line endings
        working-directory: android
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
      - name: Decode google-services.json
        working-directory: android
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          mkdir -p app
          printf '%s' "$GOOGLE_SERVICES_JSON_B64" | tr -d '\r\n\t ' | base64 -d > app/google-services.json
      # Golden-image gate: only verifyRoborazziDebug compares screenshots
      # against the committed baselines (plain unit-test runs do not).
      - name: Screenshot regression (Roborazzi)
        working-directory: android
        run: ./gradlew --no-daemon verifyRoborazziDebug
      - name: Upload screenshot diff reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-screenshot-diffs
          path: |
            android/app/build/outputs/roborazzi/
            android/app/build/reports/tests/
          retention-days: 7

  release-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0
      - name: Fix gradlew perms & line endings
        working-directory: android
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
      - name: Decode google-services.json
        working-directory: android
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          mkdir -p app
          printf '%s' "$GOOGLE_SERVICES_JSON_B64" | tr -d '\r\n\t ' | base64 -d > app/google-services.json
      # plan publish-dry-run-cmd. Heavy: builds full release artifacts on every PR.
      - name: Release dry-run (assembleRelease + bundleRelease)
        working-directory: android
        run: ./gradlew --no-daemon clean assembleRelease bundleRelease

  # Non-required: emulator-backed + env-dependent integration suite. Runs for visibility
  # but is intentionally NOT a branch-protection required check, so it does not block merge.
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Backend integration (Firebase emulator)
        working-directory: backend
        run: >-
          pnpm dlx firebase-tools@13 emulators:exec
          --only auth,firestore --project demo-playster
          "pnpm --filter functions run test"
      - name: Summarizer integration
        working-directory: summarizer/summarize-api
        env:
          API_KEYS: test-key-12345
          SUMMARIZE_TOKEN: integration-test-token
        run: pnpm run test
