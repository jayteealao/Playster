name: Android Release on Tag

on:
  push:
    tags:
      - "v*"     # e.g., v1.4.0, v2.0.0-rc.1

# Added by wf-meta build-pipeline — plan v1, 2026-06-20
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases & upload assets
#    env:
#      ACT: ${{ env.ACT }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-tags: true
          fetch-depth: 0  # needed to access full git history for changelog

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@6cfc8b8e8bb586cc164bef1c478c1eea3a4d6a19 # v3

          # Windows-safe guard
      - name: Fix gradlew perms & line endings (Windows devs)
        working-directory: android
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: check for signing secrets
        id: has_signing
        env:
          B64: ${{ secrets.SIGNING_STORE_FILE_B64 }}
        run: |
          if [ -n "$B64" ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi

      # --- Optional: Decode keystore & expose signing to Gradle ---
      - name: Decode keystore (optional)
        if: ${{ steps.has_signing.outputs.present == 'true' }}
        env:
          SIGNING_STORE_FILE_B64: ${{ secrets.SIGNING_STORE_FILE_B64 }}
        run: |
          echo "$SIGNING_STORE_FILE_B64" | base64 -d > keystore.jks

      - name: Write signing properties (optional)
        if: ${{ steps.has_signing.outputs.present == 'true' }}
        run: |
          {
            echo "SIGNING_STORE_FILE=$(pwd)/keystore.jks"
            echo "SIGNING_STORE_PASSWORD=${{ secrets.SIGNING_STORE_PASSWORD }}"
            echo "SIGNING_KEY_ALIAS=${{ secrets.SIGNING_KEY_ALIAS }}"
            echo "SIGNING_KEY_PASSWORD=${{ secrets.SIGNING_KEY_PASSWORD }}"
          } >> $GITHUB_ENV

      # --- Decode google-services.json ---
      - name: Decode google-services.json
        working-directory: android
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_SERVICES_JSON_B64:-}" ]; then
          echo "GOOGLE_SERVICES_JSON_B64 is empty."
          exit 1
          fi

          mkdir -p app

          # 1) Normalize line endings and strip *only* whitespace characters that can
          # appear in secrets files (Windows/act can inject CRLF/newlines).
          # 2) Base64-decode safely.
          printf '%s' "$GOOGLE_SERVICES_JSON_B64" \
          | tr -d '\r\n\t ' \
          | base64 -d > app/google-services.json

          # Validate the JSON so we fail fast with a clear error
          if ! command -v jq >/dev/null 2>&1; then
          sudo apt-get update -y && sudo apt-get install -y jq
          fi

          jq type app/google-services.json
          echo "google-services.json decoded and valid."
      # --- Build (adjust module & tasks as needed) ---
      # If you have flavors, e.g., prod, replace with assembleProdRelease/bundleProdRelease
      - name: Build APK + AAB
        working-directory: android
        run: |
          ./gradlew --no-daemon clean assembleRelease bundleRelease

      - name: List build outputs (debug)
        if: always()
        run: |
          echo "=== APK outputs ==="
          find android -type f \( -name "*.apk" -o -name "*.aab" \) | sort
          echo "=== Mapping files ==="
          find android -type f -name "mapping.txt" || echo "No mapping.txt found"

      # Collect artifacts
      - name: Find outputs
        id: find_outputs
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Find APK (case-insensitive for release/Release)
          APK=$(find android -type f -path "android/*/build/outputs/apk/*elease/*.apk" ! -name "*-unsigned.apk" ! -name "*-unaligned.apk" | head -n1)
          AAB=$(find android -type f -path "android/*/build/outputs/bundle/*elease/*.aab" | head -n1)
          MAP=$(find android -type f -path "android/*/build/outputs/mapping/*elease/mapping.txt" | head -n1 || true)

          echo "Found APK: ${APK}"
          echo "Found AAB: ${AAB}"
          echo "Found Mapping: ${MAP}"

          echo "apk=${APK}" >> "$GITHUB_OUTPUT"
          echo "aab=${AAB}" >> "$GITHUB_OUTPUT"
          echo "mapping=${MAP}" >> "$GITHUB_OUTPUT"

        # ── A) Run git-cliff directly when using act ──────────────────────────────────
      - name: Install git-cliff (ACT)
        if: ${{ env.ACT == 'true' }}
        run: |
          set -eux
          curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.10.1/git-cliff-2.10.1-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz
          sudo mv git-cliff*/git-cliff /usr/local/bin/git-cliff

      - name: Generate changelog (ACT)
        if: ${{ env.ACT == 'true' }}
        run: |
          git-cliff --tag "${{ env.GITHUB_REF_NAME || 'main' }}" \
            -o "CHANGELOG-${{ env.GITHUB_REF_NAME || 'main' }}.md" --verbose

      # ── B) Keep your existing action for real GitHub runs ─────────────────────────
      # --- Optional: pretty CHANGELOG from commits with git-cliff ---
      - name: Generate changelog with git-cliff (optional)
        id: cliff
        if: ${{ env.ACT != 'true' }}  # Skip on ACT runs
        continue-on-error: true
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          args: --tag ${{ steps.find_outputs.outputs.tag }} --verbose
        env:
          OUTPUT: CHANGELOG-${{ steps.find_outputs.outputs.tag }}.md

      - name: Prepare release body
        id: body
        run: |
          BODY_FILE="RELEASE_BODY.md"
          {
            echo "## Release ${{ steps.find_outputs.outputs.tag }}"
            echo
            if [ -f "CHANGELOG-${{ steps.find_outputs.outputs.tag }}.md" ]; then
              echo "### Changelog"
              echo
              cat "CHANGELOG-${{ steps.find_outputs.outputs.tag }}.md"
            else
              echo "_Auto-generated notes will be used by GitHub._"
            fi
          } > "$BODY_FILE"
          echo "file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      # Added by wf-meta build-pipeline — plan v1, 2026-06-20
      - name: Generate SBOM (syft, SPDX)
        if: ${{ env.ACT != 'true' }}
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      # Create GitHub Release + upload assets
      - name: Create release & upload assets
        if: ${{ env.ACT != 'true' }}  # Skip on ACT runs
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.find_outputs.outputs.tag }}
          name: ${{ steps.find_outputs.outputs.tag }}
          body_path: ${{ steps.body.outputs.file }}
          generate_release_notes: ${{ !hashFiles(format('CHANGELOG-{0}.md', steps.find_outputs.outputs.tag)) }}
          files: |
            ${{ steps.find_outputs.outputs.apk }}
            ${{ steps.find_outputs.outputs.aab }}
            ${{ steps.find_outputs.outputs.mapping }}
            CHANGELOG-${{ steps.find_outputs.outputs.tag }}.md
            sbom.spdx.json

      - name: Upload release outputs
        if: ${{ env.ACT == 'true' }}   # only matters locally
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Trails-${{ steps.find_outputs.outputs.tag }}
          path: |
            ${{ steps.find_outputs.outputs.apk }}
            ${{ steps.find_outputs.outputs.aab }}
            ${{ steps.find_outputs.outputs.mapping }}
            CHANGELOG-${{ steps.find_outputs.outputs.tag }}.md

  # Added by wf-meta build-pipeline — plan v1, 2026-06-20
  # Coordinated deploy of the backend + summarizer after the Android release publishes.
  deploy-backend:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Write functions params (operator allowlist uid, transcript bucket)
        working-directory: backend/functions
        env:
          ALLOWED_UID: ${{ vars.ALLOWED_UID }}
          TRANSCRIPT_BUCKET: ${{ vars.TRANSCRIPT_BUCKET }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # firebase loads params from .env.<projectId> at deploy time; the
          # operator uid is not secret (it is public in firestore.rules), so it
          # lives in a repository variable rather than a secret. Same for the
          # transcript bucket name — config, not a secret.
          if [ -z "$ALLOWED_UID" ]; then
            echo "::error::ALLOWED_UID repository variable is not set" >&2
            exit 1
          fi
          if [ -z "$TRANSCRIPT_BUCKET" ]; then
            echo "::error::TRANSCRIPT_BUCKET repository variable is not set" >&2
            exit 1
          fi
          printf 'ALLOWED_UID=%s\n' "$ALLOWED_UID" > ".env.${PROJECT_ID}"
          printf 'TRANSCRIPT_BUCKET=%s\n' "$TRANSCRIPT_BUCKET" >> ".env.${PROJECT_ID}"
      - name: Deploy Firebase Functions + Firestore rules + indexes
        working-directory: backend
        run: |
          pnpm dlx firebase-tools deploy \
            --only functions,firestore:rules,firestore:indexes \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --non-interactive --force

  deploy-summarizer:
    needs: deploy-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      REGION: us-central1   # TODO: set the Artifact Registry / Cloud Run region
      SERVICE: summarizer
      REPO: playster
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
      - name: Build & push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPO}/${SERVICE}:${GITHUB_REF_NAME}"
          docker build -f summarizer/deploy/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "$IMAGE" \
            --region "${REGION}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --platform managed \
            --no-allow-unauthenticated \
            --startup-probe=httpGet.path=/health,httpGet.port=8080,failureThreshold=3,periodSeconds=30,timeoutSeconds=10,initialDelaySeconds=10 \
            --set-secrets "SUMMARIZE_TOKEN=SUMMARIZE_TOKEN:latest,API_KEYS=SUMMARIZER_API_KEY:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest,GROQ_API_KEY=GROQ_API_KEY:latest"

  post-publish:
    needs: deploy-summarizer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      REGION: us-central1   # TODO: match the summarizer deploy region
      SERVICE: summarizer
    steps:
      - name: Wait for propagation
        run: sleep 300
      - name: Verify GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          ASSETS=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '[.assets[].name] | join(",")')
          echo "Assets: $ASSETS"
          echo "$ASSETS" | grep -qi '\.apk' && echo "$ASSETS" | grep -qi '\.aab' \
            || { echo "APK/AAB missing from release"; exit 1; }
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Verify Cloud Run health
        run: |
          # WIF can't mint an identity token for the --no-allow-unauthenticated
          # service, so no authenticated /health probe. Assert the just-deployed
          # revision is Ready instead — and since the deploy configures an HTTP
          # startup probe on /health, "Ready" now means /health returned 200.
          read -r URL LATEST_CREATED LATEST_READY < <(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(status.url,status.latestCreatedRevisionName,status.latestReadyRevisionName)')
          echo "URL=${URL} latestCreated=${LATEST_CREATED} latestReady=${LATEST_READY}"
          if ! { [ -n "${URL}" ] && [ -n "${LATEST_READY}" ] && [ "${LATEST_CREATED}" = "${LATEST_READY}" ]; }; then
            echo "Cloud Run summarizer not serving the just-deployed revision (url='${URL}', latestCreated='${LATEST_CREATED}', latestReady='${LATEST_READY}')"
            exit 1
          fi
          echo "Cloud Run summarizer healthy: just-deployed revision ${LATEST_READY} Ready (passed the /health startup probe) and serving at ${URL}"
      - name: Verify backend functions deployed
        run: gcloud functions list --project "${{ secrets.GCP_PROJECT_ID }}"
