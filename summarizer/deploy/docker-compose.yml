services:
  summarizer:
    build:
      context: ../..
      dockerfile: summarizer/deploy/Dockerfile
    environment:
      - SUMMARIZE_TOKEN=${SUMMARIZE_TOKEN}
      - API_KEYS=${API_KEYS}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - PORT=8080
    ports:
      - "8080:8080"
    networks:
      - harness

  mock-backend:
    build:
      context: ./mock-backend
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - PORT=9000
      - ARTIFACT_DIR=/verify-artifacts
    ports:
      - "9000:9000"
    volumes:
      - ./verify-artifacts:/verify-artifacts
    networks:
      - harness

networks:
  harness:
    driver: bridge
