services:
  summarize-daemon:
    build:
      context: ./daemon
    environment:
      - SUMMARIZE_TOKEN=${SUMMARIZE_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - daemon-cache:/root/.summarize
      - daemon-tmp:/tmp
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  summarize-api:
    build:
      context: ../summarize-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - DAEMON_URL=http://summarize-daemon:8787
      - SUMMARIZE_TOKEN=${SUMMARIZE_TOKEN}
      - API_KEYS=${API_KEYS}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-104857600}
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-5}
      - JOB_TIMEOUT_MS=${JOB_TIMEOUT_MS:-300000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-30}
      - DB_PATH=/app/data/jobs.db
    volumes:
      - api-data:/app/data
    networks:
      - internal
    depends_on:
      summarize-daemon:
        condition: service_healthy
    restart: unless-stopped
    # Traefik labels (uncomment and adjust for your domain)
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.summarize.rule=Host(`summarize.example.com`)"
    #   - "traefik.http.routers.summarize.entrypoints=websecure"
    #   - "traefik.http.routers.summarize.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.summarize.loadbalancer.server.port=3000"

networks:
  internal:
    driver: bridge

volumes:
  daemon-cache:
  daemon-tmp:
  api-data:
