appId: com.github.jayteealao.playster
name: cached-summary-navigation (slice-local)
# Pre-seeded summaries/VID_CACHED at status=completed. Tapping Summarize
# should navigate straight to the completed state — NO new requestVideoSummary
# invocation. Run `lazylogcat --tag playster.summary` after this flow and
# assert zero matches for `requestVideoSummary{videoId=VID_CACHED}`.
---
- runScript: helpers/seed-cached-summary.sh
- launchApp
- runFlow: helpers/signin-helper.yaml
- tapOn:
    testTag: "playlist-tile-PL_TEST_1"
- tapOn:
    testTag: "summarize-button-enabled"
- assertVisible:
    testTag: "summary-completed"
    timeout: 2000
- assertNotVisible:
    testTag: "summary-in-progress-spinner"
