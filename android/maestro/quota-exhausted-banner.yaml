appId: com.github.jayteealao.playster
name: quota-exhausted-banner (regression)
# Regression guard: with quota/openrouter exhausted, the re-skinned quota notice
# appears on the Playlist Summary tab with its semantics intact — the banner
# shows iff the quota doc is exhausted. (The old "summarize button disabled"
# assertion has no home on this cached-read surface; the generation-CTA gating
# moves to the player slice's manual-summary-fresh flow — recorded as R2.)
#
# Rewritten from the pre-redesign Material IA (playlist-tile-PL_TEST_1 /
# summarize-button-disabled on the deleted VideoListScreen) to the editorial IA
# + the harness's id: selector convention. Seeding moves OUTSIDE the flow
# (Maestro runScript is JavaScript-only).
#
# Prerequisites (run from android/ BEFORE `maestro test`):
#   1. firebase emulators:start --only auth,firestore --project playster-406121
#   2. bash maestro/helpers/seed-auth-emulator.sh
#   3. bash maestro/helpers/seed-quota-exhausted.sh   (editorial corpus + exhausted quota doc)
#   4. ./gradlew :app:installDebug
#   5. adb shell am broadcast -n com.github.jayteealao.playster/.debug.EmulatorPrefReceiver \
#        -a com.github.jayteealao.playster.debug.SET_FIREBASE_EMULATOR --ez enabled true
#   6. adb shell am force-stop com.github.jayteealao.playster
#   7. adb shell am broadcast -n com.github.jayteealao.playster/.debug.DebugAuthReceiver \
#        -a com.github.jayteealao.playster.debug.SIGN_IN
---
- launchApp
- assertVisible:
    id: "home-shelf-row-ed-p1"
- tapOn:
    id: "home-shelf-row-ed-p1"
- assertVisible:
    id: "playlist-content"
- tapOn:
    text: "Summary"
# The re-skinned quota notice appears with its copy intact.
- assertVisible:
    id: "quota-banner"
- assertVisible:
    text: "Daily summary limit reached. Resets at midnight UTC."
